name: RateLimiter
preconditions:
  - A sliding window rate limiter is initialized with a max request count and window duration
  - The limiter tracks requests per client identifier (e.g., IP address)
postconditions:
  - Requests within the limit return an allow decision
  - Requests exceeding the limit return a deny decision with retry-after duration
  - Expired request records are purged and do not count toward the limit
invariants:
  - The request count for any client never exceeds the configured maximum within any window
  - Window boundaries are computed from wall-clock time at the moment of the check
  - A client blocked at time T can always succeed at time T + window_duration
scenarios:
  - given: A fresh limiter with max=5, window=60s
    when: Client A sends 5 requests within 1 second
    then: All 5 requests are allowed
  - given: A limiter with max=5, window=60s where Client A has made 5 requests
    when: Client A sends a 6th request within the same window
    then: The request is denied with retry-after <= 60s
  - given: A limiter with max=5, window=60s where Client A made 5 requests 61 seconds ago
    when: Client A sends a new request
    then: The request is allowed (old records expired)
  - given: A limiter with max=5, window=60s where Client A is at the limit
    when: Client B sends a request
    then: Client B's request is allowed (per-client isolation)
